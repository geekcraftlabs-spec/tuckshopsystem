<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHS Tuckshop - Staff Dashboard</title>

  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
     background: linear-gradient(135deg, #1a0000 0%, #330000 100%);
      color: #ffffff;
      min-height: 100vh;
      font-family: 'Poppins', sans-serif;
    }

    header {
      background-color: #000000;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 3px 12px rgba(0,0,0,0.5);
    }

    .brand-container {
      text-align: center;
      padding: 12px 0 6px;
    }

    .main-title {
      font-family: 'Bubblegum Sans', sans-serif;
      font-size: 2.6rem;
      color: #ffffff;
      margin: 0;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
    }

    .sub-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      color: #ffffff;
      margin: 2px 0 0;
      font-weight: 500;
    }

    .navbar {
      background-color: #111111;
      padding: 10px 0;
    }

    .navbar-nav {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
    }

    .nav-item {
      margin: 0 16px;
    }

    .nav-link {
      color: #ffffff;
      font-size: 1.05rem;
      transition: color 0.3s;
    }

    .nav-link:hover, .nav-link.active {
      color: #544763;
    }
    .nav-link.active {
      color: #ffffff !important; /* ← Active link stays white */
      font-weight: 600;
    }

    .container {
      padding-top: 240px;
      padding-bottom: 60px;
    }

    @media (max-width: 768px) {
      .container {
        padding-top: 350px;
      }
    }

    .card {
      background: rgba(30, 30, 46, 0.9);
      border: 1px solid #bb86fc33;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
    }

    .card-header {
       background: linear-gradient(135deg, #800000, #4a0000); /* ← Dark maroon gradient */
      color: white;
      border-radius: 16px 16px 0 0;
    }

    .btn-collect {
       background: linear-gradient(135deg, #800000, #4a0000); /* ← Dark maroon gradient */
      border: none;
      font-weight: 600;
      border-radius: 50px;
    }

    .btn-collect:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 200, 83, 0.4);
    }

    /* Fix: Make ALL order details text WHITE and readable */
    #order-details, 
    #order-info, 
    #order-info p,
    #order-info strong,
    #payment-type,
    #payment-type strong,
    #payment-type span {
      color: #ffffff !important;
    }

    #order-info p {
      font-size: 1.05rem;
      margin-bottom: 0.75rem;
      line-height: 1.6;
    }

    #payment-type {
      background: rgba(187, 134, 252, 0.15);
      border-color: #bb86fc66;
      font-size: 1.1rem;
      padding: 1rem;
    }

    .text-success {
      color: #64dd17 !important;
      font-weight: bold;
    }

    .text-warning {
      color: #ff9800 !important;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <header>
    <div class="brand-container">
      <h1 class="main-title">Tuckshop Gurus</h1>
      <div class="sub-title">Glenvista High School</div>
    </div>

    <nav class="navbar">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="foods.html">Foods</a></li>
        <li class="nav-item"><a class="nav-link" href="beverages.html">Beverages & Snacks</a></li>
        <li class="nav-item"><a class="nav-link" href="ice-cream.html">Ice Creams</a></li>
        <li class="nav-item"><a class="nav-link active" href="staff-dashboard.html">Dashboard</a></li>
      </ul>
    </nav>
  </header>

  <div class="container my-5">
    <h1 class="text-center mb-5">Staff Dashboard</h1>

    <!-- Date Selector -->
    <div class="mb-4 text-center">
      <label class="form-label text-white">View Orders for Date</label>
      <input type="date" id="selectedDate" class="form-control d-inline-block" style="max-width: 200px;">
    </div>

    <!-- Totals -->
    <div class="card mb-5">
      <div class="card-header">
        <h3>Item Quantities</h3>
        <small>Auto-refreshes every 30 seconds</small>
      </div>
      <div class="card-body" id="totals">
        <p class="text-center text-muted">Loading...</p>
      </div>
    </div>

    <!-- Lookup -->
    <div class="card">
      <div class="card-header">
        <h3>Lookup by Order Code</h3>
      </div>
      <div class="card-body">
        <form id="lookup-form">
          <input type="text" id="orderCode" class="form-control mb-3" placeholder="Enter order code (e.g. 23-042)" maxlength="6" required>
          <button type="submit" class="btn btn-primary w-100">Lookup</button>
        </form>

        <div id="order-details" class="mt-4" style="display:none;">
          <h4 class="text-white mb-3">Order Details</h4>
          <div id="order-info" class="mb-3"></div>
          <div id="payment-type" class="alert alert-info mt-3"></div>
          <button id="mark-collected" class="btn btn-collect w-100 mt-3">Mark as Collected</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Protect page
    if (localStorage.getItem('staffLoggedIn') !== 'true') {
      window.location.href = 'staff-login.html';
    }

    const dateInput = document.getElementById('selectedDate');
    dateInput.valueAsDate = new Date();

    function loadTotals() {
      const date = dateInput.value || new Date().toISOString().slice(0,10);
      fetch(`/dashboard?date=${date}`)
        .then(r => r.json())
        .then(data => {
          const div = document.getElementById('totals');
          if (data.success) {
            if (Object.keys(data.totals).length === 0) {
              div.innerHTML = '<p class="text-center text-muted">No orders for this date.</p>';
            } else {
              let html = '<ul class="list-group list-group-flush">';
              for (let item in data.totals) {
                html += `<li class="list-group-item bg-transparent text-white border-bottom"><strong>${item}</strong>: ${data.totals[item]}x</li>`;
              }
              html += '</ul>';
              div.innerHTML = html;
            }
          } else {
            div.innerHTML = '<p class="alert alert-warning">Error loading totals.</p>';
          }
        })
        .catch(err => {
          console.error(err);
          document.getElementById('totals').innerHTML = '<p class="alert alert-danger">Could not connect to server.</p>';
        });
    }

    loadTotals();
    setInterval(loadTotals, 30000);
    dateInput.addEventListener('change', loadTotals);

    // Lookup by order code
    document.getElementById('lookup-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const code = document.getElementById('orderCode').value.trim();
      if (code.length < 5 || code.length > 6 || !/^\d{2}-\d{3}$/.test(code)) {
        alert('Enter valid code (e.g. 23-042)');
        return;
      }

      const res = await fetch(`/orders/lookup/${code}`);
      const data = await res.json();

      const details = document.getElementById('order-details');
      if (data.success) {
        const o = data.order;
        document.getElementById('order-info').innerHTML = `
          <p><strong>Code:</strong> ${o.shortCode}</p>
          <p><strong>Student:</strong> ${o.name} ${o.surname}</p>
          <p><strong>Date:</strong> ${new Date(o.pickupDate).toDateString()}</p>
          <p><strong>Items:</strong> ${o.items.map(i => `${i.qty}x ${i.name}`).join(', ')}</p>
          <p><strong>Total:</strong> R${o.total}</p>
        `;
        document.getElementById('payment-type').innerHTML = `
          <strong>Status:</strong> 
          ${o.isCollected ? '<span class="text-success fw-bold">Collected</span>' : '<span class="text-warning fw-bold">Pending Collection</span>'}
        `;
        document.getElementById('mark-collected').style.display = o.isCollected ? 'none' : 'block';
        details.style.display = 'block';
      } else {
        alert(data.error || 'Order not found');
        details.style.display = 'none';
      }
    });

    document.getElementById('mark-collected').onclick = async () => {
      const code = document.getElementById('orderCode').value.trim();
      const res = await fetch('/orders/mark-collected', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({shortCode: code})
      });
      const data = await res.json();
      if (data.success) {
        alert('Marked as collected');
        location.reload();
      } else {
        alert(data.error || 'Failed');
      }
    };
  </script>
</body>
</html>
