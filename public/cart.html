<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHS Tuckshop - Your Cart</title>

  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>

  <style>
    body { background-color: #f8f9fa; }
    header { background-color: #000000; position: relative; text-align: center; top: 0; left: 0; right: 0; z-index: 1000; box-shadow: 0 3px 12px rgba(0,0,0,0.5); }
    .brand-container { text-align: center; padding: 12px 0 6px; }
    .main-title { font-family: 'Bubblegum Sans', sans-serif; font-size: 2.6rem; color: #ffffff; margin: 0; text-shadow: 1px 1px 4px rgba(0,0,0,0.6); }
    .sub-title { font-family: 'Poppins', sans-serif; font-size: 1.8rem; color: #cccccc; margin: 2px 0 0; font-weight: 500; }
    .navbar { background-color: #111111; padding: 10px 0; position: relative; z-index: 1; }
    .navbar-nav { display: flex; justify-content: center; width: 100%; flex-wrap: wrap; }
    .nav-item { margin: 0 16px; }
    .nav-link { color: #ffffff; font-size: 1.05rem; font-family: 'Poppins', sans-serif; text-decoration: none; transition: color 0.3s ease; }
    .nav-link:hover { color: #bbbbbb; }
    @media (max-width: 768px) { .main-title { font-size: 2.1rem; } .sub-title { font-size: 1.5rem; } .navbar { padding: 6px 0; } .nav-item { margin: 6px 12px; } .nav-link { font-size: 0.98rem; } body { padding-top: 0px; } }
    @media (max-width: 576px) { .main-title { font-size: 1.8rem; } .sub-title { font-size: 1.3rem; } .nav-item { margin: 5px 10px; } }
    .fixed-cart { position: fixed; top: 15px; right: 15px; z-index: 1000; background: #28a745; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-decoration: none; }
    .fixed-cart span { font-weight: bold; }
  </style>
</head>
<body>

  <header>
    <div class="brand-container">
      <h1 class="main-title">Tuckshop Gurus</h1>
      <div class="sub-title">Glenvista High School</div>
    </div>

    <nav class="navbar">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="foods.html">Foods</a></li>
        <li class="nav-item"><a class="nav-link" href="beverages.html">Beverages & Snacks</a></li>
        <li class="nav-item"><a class="nav-link" href="ice-cream.html">Ice Creams</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link" href="staff-login.html">Staff Login</a></li>
      </ul>
    </nav>
  </header>

  <a href="cart.html" class="fixed-cart" id="cart-icon">
    🛒 <span id="cart-count">0</span>
  </a>

  <div class="container my-5">
    <h1 class="text-center mb-4">Your Cart</h1>

    <div id="cart-items" class="mb-5"></div>

    <div class="card mb-4">
      <div class="card-body">
        <h5>Order Summary</h5>
        <p>Subtotal: <span id="subtotal">R0.00</span></p>
        <p>Service Fee: R3.00</p>
        <h4>Total: <strong id="total">R0.00</strong></h4>
      </div>
    </div>

    <form id="finalize-form">
      <div class="mb-3">
        <label for="pickupDate" class="form-label">Pickup Date</label>
        <p class="text-muted small mb-2">
          Orders for today close at 8:30 AM. After that, only future dates are available.
        </p>
        <input type="text" class="form-control" id="pickupDate" placeholder="Select date" required>
      </div>
      <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" required>
      </div>
      <div class="mb-3">
        <label for="surname" class="form-label">Surname</label>
        <input type="text" class="form-control" id="surname" required>
      </div>
      <div class="mb-3">
        <label for="contact" class="form-label">Email (for confirmation)</label>
        <input type="email" class="form-control" id="contact" required>
      </div>

      <button type="submit" class="btn btn-success btn-lg w-100">Proceed to Payment</button>
    </form>
  </div>

  <script>
    let cart = JSON.parse(localStorage.getItem('ghsCart')) || [];

    function updateCartCount() {
      const count = cart.reduce((sum, item) => sum + (item.qty || 0), 0);
      document.getElementById('cart-count').textContent = count;
      document.getElementById('cart-icon').style.display = count > 0 ? 'flex' : 'none';
    }

    function renderCart() {
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let subtotal = 0;

      if (cart.length === 0) {
        container.innerHTML = '<p class="text-center text-muted">Your cart is empty. <a href="foods.html">Add items</a>.</p>';
      } else {
        cart.forEach((item, index) => {
          const qty = item.qty || 0;
          const price = item.price || 0;
          const itemTotal = qty * price;
          subtotal += itemTotal;

          container.innerHTML += `
            <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-3">
              <div class="flex-grow-1">
                <strong>${item.name}</strong><br>
                R${price.toFixed(2)} each
              </div>
              <div class="d-flex align-items-center gap-2 qty-controls">
                <button class="btn btn-sm btn-outline-danger rounded-circle" onclick="changeQuantity(${index}, -1)">−</button>
                <span class="fw-bold px-3">${qty}</span>
                <button class="btn btn-sm btn-outline-success rounded-circle" onclick="changeQuantity(${index}, 1)">+</button>
              </div>
              <div class="text-end ms-3 fw-bold">
                R${itemTotal.toFixed(2)}
              </div>
            </div>
            <div class="text-end mb-4">
              <a href="#" class="remove-link" onclick="removeItem(${index}); return false;">Remove item</a>
            </div>
          `;
        });
      }

      document.getElementById('subtotal').textContent = `R${subtotal.toFixed(2)}`;
      document.getElementById('total').textContent = `R${(subtotal + 3).toFixed(2)}`;
      updateCartCount();
    }

    function changeQuantity(index, delta) {
      if (!cart[index]) return;
      cart[index].qty = (cart[index].qty || 0) + delta;
      if (cart[index].qty < 1) cart[index].qty = 1;
      if (cart[index].qty > 3) cart[index].qty = 3;
      localStorage.setItem('ghsCart', JSON.stringify(cart));
      renderCart();
    }

    function removeItem(index) {
      if (confirm('Remove this item?')) {
        cart.splice(index, 1);
        localStorage.setItem('ghsCart', JSON.stringify(cart));
        renderCart();
      }
    }

    // Flatpickr date picker with 8:30 AM cutoff
    flatpickr("#pickupDate", {
      dateFormat: "Y-m-d",
      minDate: "today",
      disable: [
        function(date) {
          const now = new Date();
          const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          const isToday = date.toDateString() === today.toDateString();
          if (isToday && now.getHours() >= 8 && now.getMinutes() >= 30) {
            return true;
          }
          return date < today;
        }
      ],
      onReady: function(selectedDates, dateStr, instance) {
        const now = new Date();
        if (now.getHours() >= 8 && now.getMinutes() >= 30) {
          const tomorrow = new Date(now);
          tomorrow.setDate(tomorrow.getDate() + 1);
          instance.setDate(tomorrow, true);
        }
      },
      onChange: function(selectedDates, dateStr, instance) {
        const selected = selectedDates[0];
        const now = new Date();
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        if (selected && selected.toDateString() === today.toDateString() &&
            now.getHours() >= 8 && now.getMinutes() >= 30) {
          alert("Orders for today are no longer available after 8:30 AM. Please select tomorrow or later.");
          const tomorrow = new Date(now);
          tomorrow.setDate(tomorrow.getDate() + 1);
          instance.setDate(tomorrow, true);
        }
      }
    });

    // Finalize form → Create YOCO checkout session and redirect
    document.getElementById('finalize-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (cart.length === 0) {
        alert('Your cart is empty!');
        return;
      }

      const pickupDate = document.getElementById('pickupDate').value;
      if (!pickupDate) {
        alert('Please select a pickup date');
        return;
      }

      const name = document.getElementById('name').value.trim();
      const surname = document.getElementById('surname').value.trim();
      const contact = document.getElementById('contact').value.trim();
      const total = parseFloat(document.getElementById('total').textContent.replace('R', ''));

      if (!name || !surname || !contact.includes('@') || total <= 0) {
        alert('Please fill in all required details correctly (valid email and total > R0.00)');
        return;
      }

      const orderData = {
        pickupDate: `${pickupDate}T00:00:00.000Z`,
        name,
        surname,
        contact,
        items: cart,
        total
      };

      try {
        console.log('Sending to /create-checkout:', JSON.stringify(orderData, null, 2));

        const res = await fetch('/create-checkout', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)
        });

        const result = await res.json();
        console.log('Backend response:', result);

        if (result.success) {
          // Save pending order to localStorage for the payment page
          localStorage.setItem('pendingOrder', JSON.stringify(result.pendingOrder));
          console.log('Redirecting to YOCO checkout:', result.checkoutUrl);
          window.location.href = result.checkoutUrl;
        } else {
          const errorMsg = result.error || 'Unknown error';
          console.error('Backend error:', errorMsg);
          alert(`Failed to start payment:\n${errorMsg}`);
        }
      } catch (err) {
        // console.error('Fetch error:', err);
        alert('Error connecting to server: ' + (err.message || 'Network issue'));
      }
    });

    // Initial render
    renderCart();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
