<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHS Tuckshop - Payment</title>

  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body { background: linear-gradient(135deg, #0f0f1a 0%, #1a0033 100%); color: #ffffff; font-family: 'Poppins', sans-serif; min-height: 100vh; }
    .container { max-width: 600px; padding-top: 140px; }
    .card { background: rgba(30, 30, 46, 0.9); border: 1px solid #bb86fc33; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); }
    .card-header { background: linear-gradient(135deg, #6200ea, #aa00ff); color: white; border-radius: 16px 16px 0 0; }
    .btn-pay { background: linear-gradient(90deg, #00c853, #64dd17); border: none; font-weight: 600; border-radius: 50px; transition: all 0.3s; }
    .btn-pay:disabled { opacity: 0.5; cursor: not-allowed; }
    .summary-item { border-bottom: 1px solid #bb86fc33; padding: 8px 0; color: #ffffff !important; }
    .summary-item span, .summary-item strong { color: #ffffff !important; }
    #payment-total { color: #ffffff !important; font-size: 1.5rem; font-weight: bold; }
    .loader {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid #fff;
      border-radius: 50%;
      border-top-color: transparent;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <div class="container my-5">
    <h1 class="text-center mb-4">Secure Payment</h1>

    <div class="card">
      <div class="card-header text-center">
        <h4>Order Summary</h4>
      </div>
      <div class="card-body">
        <div id="order-summary" class="mb-3"></div>
        <hr class="my-4 border-secondary">
        <h5 class="text-center" id="total-pay-label">Total Pay: <strong id="payment-total">R0.00</strong></h5>

        <button id="pay-button" class="btn-pay btn-lg w-100 mt-4">Proceed to Payment</button>
        <p class="text-center text-muted small mt-3">Powered by YOCO – Secure & Encrypted</p>
      </div>
    </div>

    <div class="text-center mt-4">
      <a href="cart.html" class="text-white">← Back to Cart</a>
    </div>
  </div>

  <script>
    (async function() {
      console.log("✅ Payment page loaded");
      
      const pendingOrder = JSON.parse(localStorage.getItem('pendingOrder'));
      console.log("📦 Pending order:", pendingOrder);

      if (!pendingOrder || !pendingOrder.items || pendingOrder.items.length === 0) {
        document.getElementById('order-summary').innerHTML = '<p class="text-center text-danger">No order found. Please go back to cart.</p>';
        document.getElementById('pay-button').disabled = true;
        return;
      }

      // Display order summary
      let html = '';
      let subtotal = 0;

      pendingOrder.items.forEach(item => {
        const itemTotal = item.qty * item.price;
        subtotal += itemTotal;
        html += `
          <div class="summary-item d-flex justify-content-between">
            <span>${item.qty}x ${item.name}</span>
            <span>R${itemTotal.toFixed(2)}</span>
          </div>
        `;
      });

      html += `
        <div class="summary-item d-flex justify-content-between mt-3">
          <strong>Subtotal</strong>
          <strong>R${subtotal.toFixed(2)}</strong>
        </div>
        <div class="summary-item d-flex justify-content-between">
          <span>Service Fee</span>
          <span>R3.00</span>
        </div>
      `;

      document.getElementById('order-summary').innerHTML = html;
      document.getElementById('payment-total').textContent = `R${(subtotal + 3).toFixed(2)}`;

      // Create checkout and redirect to YOCO
      document.getElementById('pay-button').addEventListener('click', async () => {
        console.log("💰 Creating checkout...");
        
        const btn = document.getElementById('pay-button');
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span> Redirecting...';

        try {
          const response = await fetch('/create-checkout', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(pendingOrder)
          });

          const result = await response.json();
          console.log("Checkout result:", result);

          if (result.success) {
            // Save pending order to localStorage
            localStorage.setItem('pendingOrder', JSON.stringify(result.pendingOrder));
            console.log("Redirecting to YOCO...");
            window.location.href = result.checkoutUrl;
          } else {
            alert(`Error: ${result.error || 'Failed to create checkout'}`);
            btn.disabled = false;
            btn.innerHTML = 'Proceed to Payment';
          }
        } catch (err) {
          console.error("Error:", err);
          alert('Connection error. Please try again.');
          btn.disabled = false;
          btn.innerHTML = 'Proceed to Payment';
        }
      });
    })();
  </script>
</body>
</html>
