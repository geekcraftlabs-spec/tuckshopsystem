<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GHS Tuckshop - Staff Login</title>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
  background: linear-gradient(135deg, #1a0000 0%, #330000 100%);
  color: #ffffff;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;
}

    /* ── FIXED TOP NAVIGATION BAR ────────────────────────────────────────── */
    header {
      background-color: #000000;
      position: relative;
      text-align: center;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      box-shadow: 0 3px 12px rgba(0,0,0,0.7);
    }

    .brand-container {
      text-align: center;
      padding: 12px 0 6px;
    }

    .main-title {
      font-family: 'Bubblegum Sans', sans-serif;
      font-size: 2.6rem;
      color: #ffffff;
      margin: 0;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.6);
    }

    .sub-title {
      font-family: 'Poppins', sans-serif;
      font-size: 1.8rem;
      color: #ffffff;
      margin: 2px 0 0;
      font-weight: 500;
    }

    .navbar {
      background-color: #111111;
      padding: 10px 0;
      position: relative;
      z-index: 1;
    }

    .navbar-nav {
      display: flex;
      justify-content: center;
      width: 100%;
      flex-wrap: wrap;
    }

    .nav-item {
      margin: 0 16px;
    }

    .nav-link {
      color: #ffffff;
      font-size: 1.05rem;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .nav-link:hover {
      color: #800000;
    }

    .nav-link.active {
      color: #ffffff !important; /* ← Active link stays white */
      font-weight: 600;
    }

    /* Mobile adjustments */
    @media (max-width: 768px) {
      .main-title { font-size: 2.1rem; }
      .sub-title { font-size: 1.5rem; }
      .navbar { padding: 6px 0; }
      .nav-item { margin: 6px 12px; }
      .nav-link { font-size: 0.98rem; }
      body { padding-top: 0px; }
    }

    @media (max-width: 576px) {
      .main-title { font-size: 1.8rem; }
      .sub-title { font-size: 1.3rem; }
      .nav-item { margin: 5px 10px; }
    }

    /* ── Login Card ──────────────────────────────────────────────────────── */
    .login-container {
      min-height: calc(100vh - 140px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: rgba(30, 30, 46, 0.9);
      backdrop-filter: blur(10px);
      border: 1px solid #80000033;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.6);
      max-width: 420px;
      width: 100%;
      overflow: hidden;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card-header {
      background: linear-gradient(135deg, #800000, #4a0000); /* ← Dark maroon gradient */
      color: white;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .card-header h2 {
      margin: 0;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .card-body {
      padding: 2.5rem 2rem;
    }

    .form-control {
      background: #2d2d3e;
      border: 1px solid #80000044; /* ← Dark maroon border */
      color: white;
      border-radius: 8px;
      padding: 0.75rem 1.25rem;
    }

    .form-control:focus {
      border-color: #800000; /* ← Dark maroon focus */
      box-shadow: 0 0 0 0.25rem rgba(187, 134, 252, 0.25);
      background: #2d2d3e;
      color: white;
    }

    .form-label {
      color: #e0e0e0;
      font-weight: 500;
    }

    .btn-login {
      background: linear-gradient(90deg, #800000, #4a0000); /* ← Dark maroon gradient */
      border: none;
      color: white;
      font-weight: 600;
      padding: 0.9rem;
      border-radius: 50px;
      transition: all 0.3s ease;
      width: 100%;
    }

    .btn-login:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 25px rgba(170, 0, 255, 0.4);
    }

    .forgot-link {
      color: #ffffff; /* ← Changed to white */
      text-decoration: none;
      font-size: 0.95rem;
    }

    .forgot-link:hover {
      text-decoration: underline;
      color: #e0e0e0;
    }
  </style>
</head>
<body>

  <!-- Fixed Top Navigation Bar -->
  <header>
    <div class="brand-container">
      <h1 class="main-title">Tuckshop Gurus</h1>
      <div class="sub-title">Glenvista High School</div>
    </div>

    <nav class="navbar">
      <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="foods.html">Foods</a></li>
        <li class="nav-item"><a class="nav-link" href="beverages.html">Beverages & Snacks</a></li>
        <li class="nav-item"><a class="nav-link" href="ice-cream.html">Ice Creams</a></li>
        <li class="nav-item"><a class="nav-link" href="cart.html">Cart</a></li>
        <li class="nav-item"><a class="nav-link active" href="staff-login.html">Staff Login</a></li>
      </ul>
    </nav>
  </header>

  <!-- Login Form -->
  <div class="login-container">
    <div class="login-card">
      <div class="card-header">
        <h2>Staff Login</h2>
      </div>
      <div class="card-body">
        <form id="staff-login-form">
          <div class="mb-4">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control" id="username" placeholder="ghsstaff" required>
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required>
          </div>
          <button type="submit" class="btn btn-login">Login</button>
          <div class="text-center mt-3">
            <a href="#" class="forgot-link">Forgot Password?</a>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Simple client-side login check (demo only)
    document.getElementById('staff-login-form').addEventListener('submit', function(e) {
      e.preventDefault();

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();

      // Hardcoded credentials (change in production!)
      if (username === 'ghsstaff' && password === 'ghsstaff2026') {
        localStorage.setItem('staffLoggedIn', 'true');
        alert('Login successful! Redirecting to dashboard...');
        window.location.href = 'staff-dashboard.html';
      } else {
        alert('Invalid username or password. Try again.');
      }
    });
  </script>
</body>
</html>
